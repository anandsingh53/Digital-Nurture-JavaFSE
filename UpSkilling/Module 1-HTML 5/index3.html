<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>
        /* Styling using ID */
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Styling using class */
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
        <h1>Welcome User!</h1>
        <p class="highlight">You are successfully logged in.</p>

        <p>
            Special Offer:
            <span style="color: red; font-weight: bold;">
                50% Discount on Event Registration!
            </span>
        </p>
    </div>

</body>
</html>
