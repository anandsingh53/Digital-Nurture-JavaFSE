<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Invite</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }

        video {
            border: 2px solid black;
        }

        #message {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Community Event Promo Video</h2>

    <!-- Video Element -->
    <video width="500" controls oncanplay="videoReady()">
        <source src="video7.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <p id="message"></p>

    <script>
        // Display message when video is ready
        function videoReady() {
            document.getElementById("message")
            .innerHTML = "Video ready to play";
        }

        // Warn before leaving unfinished page
        window.onbeforeunload = function () {
            return "Are you sure you want to leave this page?";
        };
    </script>

</body>
</html>
