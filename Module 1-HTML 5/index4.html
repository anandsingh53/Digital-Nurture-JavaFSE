<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        .event-image {
            border: 3px solid black;
            width: 200px;
            height: 150px;
        }

        table {
            margin: auto;
        }

        td {
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2 align="center">Community Events Gallery</h2>

    <table border="1">
        <tr>
            <td>
                <img src="music.jpg" alt="Music Event"
                     title="Music Event" class="event-image">
                <p>Music Festival</p>
            </td>

            <td>
                <img src="food-festival.jpg" alt="Food Event"
                     title="Food Event" class="event-image">
                <p>Food Festival</p>
            </td>

          
        </tr>

        <tr>
            <td>
                <img src="dance competition.webp" alt="Dance Event"
                     title="Dance Event" class="event-image">
                <p>Dance Show</p>
            </td>
   <td>
                <img src="sportsfest.jpg" alt="Sports Event"
                     title="Sports Event" class="event-image">
                <p>Sports Competition</p>
            </td>
          </tr>
    </table>

</body>
</html>
