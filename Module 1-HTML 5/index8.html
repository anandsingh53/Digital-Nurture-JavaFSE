<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving User Preferences</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }

        select, button {
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>

    <h2>Select Your Preferred Event</h2>

    <!-- Event Dropdown -->
    <select id="eventType" onchange="savePreference()">
        <option value="">Choose Event</option>
        <option value="Music Event">Music Event</option>
        <option value="Sports Event">Sports Event</option>
        <option value="Food Festival">Food Festival</option>
    </select>

    <br>

    <!-- Clear Button -->
    <button onclick="clearPreferences()">
        Clear Preferences
    </button>

    <script>
        // Load saved preference on page reload
        window.onload = function () {
            let savedEvent =
            localStorage.getItem("preferredEvent");

            if(savedEvent) {
                document.getElementById("eventType")
                .value = savedEvent;
            }
        };

        // Save selected event
        function savePreference() {
            let selectedEvent =
            document.getElementById("eventType").value;

            localStorage.setItem(
                "preferredEvent",
                selectedEvent
            );

            // Example sessionStorage
            sessionStorage.setItem(
                "currentSession",
                selectedEvent
            );
        }

        // Clear storage
        function clearPreferences() {
            localStorage.clear();
            sessionStorage.clear();

            document.getElementById("eventType")
            .value = "";

            alert("Preferences Cleared!");
        }
    </script>

</body>
</html>
